name: CI Testing Liga Deportiva

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  angular-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: |
          cd ligadeportiva-app
          npm install

      - name: Run Angular tests
        run: |
          cd ligadeportiva-app
          npm run test -- --watch=false --browsers=ChromeHeadless

  cypress-tests:
    runs-on: ubuntu-latest
    needs: [angular-tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and run Cypress
        run: |
          cd ligadeportiva-app
          npm install
          npm run build
          npx serve -s dist/ligadeportiva-app -l 4200 &
          sleep 5
          npx cypress run